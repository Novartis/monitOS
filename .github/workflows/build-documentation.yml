on:
  push:
    branches: [main]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-renv@v2

      - name: Install shinylive
        run: |
          Rscript -e 'install.packages("shinylive")'

      - name: Export shinylive app
        run: |
          Rscript -e 'shinylive::export("inst/shinylive-app", "docs/shinylive-app")'

      - name: Deploy documentation
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          LOAD_MONITOS_PACKAGE=true Rscript -e "pkgdown::deploy_to_branch(new_process = FALSE)"
