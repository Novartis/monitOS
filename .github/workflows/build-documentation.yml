on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::shinylive, any::pkgload
          needs: website

      - name: Build pkgdown site (PR preview — no deploy)
        if: github.event_name == 'pull_request'
        run: |
          LOAD_MONITOS_PACKAGE=true Rscript -e "pkgdown::build_site(new_process = FALSE)"
          Rscript -e 'shinylive::export("inst/shinylive-app", "docs/shinylive-app")'

      - name: Build and deploy documentation
        if: github.event_name != 'pull_request'
        run: |
          LOAD_MONITOS_PACKAGE=true Rscript -e "pkgdown::build_site(new_process = FALSE)"
          Rscript -e 'shinylive::export("inst/shinylive-app", "docs/shinylive-app")'
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add --force docs/
          git commit -m "Deploy pkgdown site with Shinylive [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:gh-pages --force
